name: build-node

# spec §11/P7: node 全平台 PyInstaller 构建 + GitHub Release
on:
  push:
    tags: ['node-v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: tagai-node-linux-amd64
          - os: macos-latest
            asset: tagai-node-darwin-arm64
          - os: windows-latest
            asset: tagai-node-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e ".[dev,scraper]" pyinstaller
        shell: bash
      - name: Test
        run: .venv/bin/pytest -q
        shell: bash
      - name: Build (PyInstaller)
        run: .venv/bin/pyinstaller tagai-node.spec --noconfirm
        shell: bash
      - name: Rename and checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv tagai-node.exe "${{ matrix.asset }}"
          else
            mv tagai-node "${{ matrix.asset }}"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            packages/node/dist/${{ matrix.asset }}
            packages/node/dist/${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/node-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
