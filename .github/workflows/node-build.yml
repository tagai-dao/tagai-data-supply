name: build-node

# spec §11/P7: node 全平台 PyInstaller 构建 + GitHub Release
on:
  push:
    tags: ['node-v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: tagai-node-linux-amd64
            expected_arch: x86_64
          - os: macos-latest
            asset: tagai-node-darwin-arm64
            expected_arch: arm64
            macos_deployment_target: '11.0'
          # 2018 and earlier Intel Macs (including the 2014 Mac mini sold in 2015)
          # need a native x86_64 binary. macos-latest is an arm64 runner.
          - os: macos-15-intel
            asset: tagai-node-darwin-amd64
            expected_arch: x86_64
            macos_deployment_target: '10.15'
          - os: windows-latest
            asset: tagai-node-windows-amd64.exe
            expected_arch: x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        shell: bash
        run: |
          python -m venv .venv
          if [ -f .venv/Scripts/python.exe ]; then
            VPY=.venv/Scripts/python
          else
            VPY=.venv/bin/python
          fi
          echo "VENV_PYTHON=$VPY" >> "$GITHUB_ENV"
          "$VPY" -m pip install -U pip
          "$VPY" -m pip install -e ".[dev,scraper]" pyinstaller
      - name: Test
        shell: bash
        run: ${{ env.VENV_PYTHON }} -m pytest -q
      - name: Build (PyInstaller)
        shell: bash
        env:
          # Keep the Intel binary usable on Catalina through Monterey instead
          # of inheriting the macOS 15 runner's deployment target.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: ${{ env.VENV_PYTHON }} -m PyInstaller tagai-node.spec --noconfirm
      - name: Verify macOS architecture and executable
        if: runner.os == 'macOS'
        shell: bash
        run: |
          actual_arch="$(lipo -archs dist/tagai-node)"
          test "$actual_arch" = "${{ matrix.expected_arch }}"
          file dist/tagai-node
          otool -l dist/tagai-node | grep -A 3 -E 'LC_BUILD_VERSION|LC_VERSION_MIN_MACOSX' || true
          dist/tagai-node --version
      - name: Rename and checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv tagai-node.exe "${{ matrix.asset }}"
          else
            mv tagai-node "${{ matrix.asset }}"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            packages/node/dist/${{ matrix.asset }}
            packages/node/dist/${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/node-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
