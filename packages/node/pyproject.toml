[project]
name = "tagai-data-supply-node"
version = "0.1.3"
description = "tagai-data-supply 抓取节点（用户自部署）"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "websockets>=12.0",
    "pydantic>=2.7",
    "click>=8.1",
    "certifi>=2024.0",
]

[project.optional-dependencies]
# twikit-ng 提供 twikit 命名空间，修复 2026-03 X 改版（勿与 twikit 2.3.3 混装）
scraper = ["twikit-ng>=2.5.1"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
tagai-node = "tagai_data_supply.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
